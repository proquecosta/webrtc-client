<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebRTC SIP Client</title>
  <style>
    body { font-family: monospace; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h2   { margin-bottom: 4px; }
    #status { font-size: 1.1em; font-weight: bold; margin-bottom: 16px; }

    .row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    input  { padding: 6px 10px; font-size: 1em; flex: 1; }
    button { padding: 6px 14px; font-size: 1em; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: default; }

    #incoming { background: #fff3cd; border: 1px solid #ffc107; padding: 12px; border-radius: 4px; margin-bottom: 12px; }
    #incoming.hidden { display: none; }

    #log { border-top: 1px solid #ccc; margin-top: 16px; padding-top: 8px; max-height: 260px; overflow-y: auto; font-size: 0.85em; color: #444; }
  </style>
</head>
<body>

  <h2>WebRTC Phone</h2>
  <div id="status" style="color: gray">Not registered</div>

  <div class="row">
    <input id="extensionInput" type="text" value="1001" placeholder="Extension">
    <input id="passwordInput" type="password" placeholder="Password">
    <button id="registerBtn">Register</button>
  </div>

  <div class="row">
    <input id="target" type="text" value="1003" placeholder="Extension to call">
    <button id="callBtn" disabled>Call</button>
    <button id="hangupBtn" disabled>Hang up</button>
  </div>

  <div id="incoming" class="hidden">
    <strong>Incoming call from <span id="caller">?</span></strong><br><br>
    <button id="answerBtn">Answer</button>
    <button id="rejectBtn">Reject</button>
  </div>

  <audio id="remoteAudio" autoplay></audio>

  <div id="log"></div>

  <script src="bundle.js"></script>
</body>
</html>
